<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>組合屋屋頂計算器</title>
<style>
body { background:#0d0d0d; color:#fff; font-family:Arial; padding:20px; margin:0; }
h1  { text-align:center; margin-bottom:30px; }

.main-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
  max-width:1400px;
  margin:0 auto;
}
.wide { grid-column:1/-1; }

.container {
  background:#1a1a1a; padding:20px; border-radius:12px;
  display:flex; flex-direction:column;
}
.container h2 { margin-top:0; border-bottom:2px solid #333; padding-bottom:10px; }

.row { display:flex; margin:8px 0; align-items:center; }
.row label { width:90px; text-align:right; padding-right:10px; font-size:14px; color:#aaa; }
.row input,.row select {
  flex:1; padding:8px; background:#262626; color:#fff;
  border:1px solid #555; border-radius:6px; text-align:center; font-size:16px;
}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }

button {
  width:100%; padding:14px; margin-top:12px;
  background:#1a73e8; color:#fff; border:none; border-radius:8px;
  font-size:17px; font-weight:bold; cursor:pointer;
  box-shadow:0 5px 0 #114b9e; transition:all .1s; -webkit-tap-highlight-color:transparent;
}
button:active { transform:translateY(5px); box-shadow:0 0 0 #114b9e; background:#155cb8; }

.btn-sm {
  width:auto; padding:8px 14px; font-size:13px; margin-top:0;
  background:#333; box-shadow:0 4px 0 #111;
}
.btn-sm:active { background:#222; box-shadow:0 0 0 #111; }

.result-box {
  margin-top:12px; padding:12px; background:#111; border-radius:8px;
  min-height:24px; line-height:1.8;
}

.size-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:8px 0; }
.sz {
  padding:10px 4px; background:#262626; border:2px solid #555;
  border-radius:8px; color:#fff; cursor:pointer; text-align:center;
  font-size:14px; transition:border-color .15s, background .15s; user-select:none;
}
.sz:hover { border-color:#888; }
.sz.on  { border-color:#1a73e8; background:#1a3a6e; }

#canvasWrap {
  overflow:auto; margin-top:10px; border:1px solid #333;
  border-radius:8px; background:#111; padding:10px;
}
canvas { display:block; cursor:pointer; touch-action:none; }

.ctrl-bar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin:10px 0; }
.ctrl-bar select {
  width:62px; padding:6px; background:#262626; color:#fff;
  border:1px solid #555; border-radius:6px; font-size:16px; text-align:center;
}
.ctrl-bar span { color:#aaa; font-size:14px; }

.mat-row {
  display:flex; justify-content:space-between;
  padding:6px 0; border-bottom:1px solid #222;
}
.mat-row:last-child { border-bottom:none; }
.mat-lbl { color:#aaa; font-size:14px; }
.mat-val { color:#4da3ff; font-weight:bold; }

a.back { display:inline-block; color:#888; text-decoration:none; font-size:13px; margin-bottom:18px; }
a.back:hover { color:#fff; }
</style>
</head>
<body>

<a class="back" href="index.html">← 回工程計算器</a>
<h1>🏗️ 組合屋屋頂計算器</h1>

<div class="main-grid">

  <div class="container">
    <h2>① 模組規格</h2>
    <p style="color:#666;font-size:13px;margin:0 0 10px;">每間組合屋固定尺寸，寬度與深度各自選擇</p>

    <label style="color:#aaa;font-size:13px;">面寬（橫向）</label>
    <div class="size-grid" id="wBtns">
      <div class="sz on" data-v="301" onclick="pickW(301,this)">3米<br><small style="color:#888">301cm</small></div>
      <div class="sz"    data-v="396" onclick="pickW(396,this)">4米<br><small style="color:#888">396cm</small></div>
      <div class="sz"    data-v="500" onclick="pickW(500,this)">5米<br><small style="color:#888">500cm</small></div>
      <div class="sz"    data-v="596" onclick="pickW(596,this)">6米<br><small style="color:#888">596cm</small></div>
      <div class="sz"    data-v="690" onclick="pickW(690,this)">7米<br><small style="color:#888">690cm</small></div>
      <div class="sz"    data-v="785" onclick="pickW(785,this)">8米<br><small style="color:#888">785cm</small></div>
    </div>

    <label style="color:#aaa;font-size:13px;display:block;margin-top:8px;">進深（縱向）</label>
    <div class="size-grid" id="dBtns">
      <div class="sz"    data-v="301" onclick="pickD(301,this)">3米<br><small style="color:#888">301cm</small></div>
      <div class="sz"    data-v="396" onclick="pickD(396,this)">4米<br><small style="color:#888">396cm</small></div>
      <div class="sz"    data-v="500" onclick="pickD(500,this)">5米<br><small style="color:#888">500cm</small></div>
      <div class="sz on" data-v="596" onclick="pickD(596,this)">6米<br><small style="color:#888">596cm</small></div>
      <div class="sz"    data-v="690" onclick="pickD(690,this)">7米<br><small style="color:#888">690cm</small></div>
      <div class="sz"    data-v="785" onclick="pickD(785,this)">8米<br><small style="color:#888">785cm</small></div>
    </div>

    <div class="result-box" id="sizeInfo" style="text-align:center;font-size:15px;">
      每間：301 × 596 cm｜<b>5.43 坪</b>
    </div>

    <label style="color:#aaa;font-size:13px;display:block;margin-top:14px;">數量</label>
    <div style="display:flex;align-items:center;gap:10px;margin:8px 0;">
      <button class="btn-sm" onclick="changeCount(-1)" style="width:44px;font-size:20px;padding:6px">－</button>
      <span id="bldCountVal" style="font-size:26px;font-weight:bold;min-width:44px;text-align:center;color:#fff;">4</span>
      <button class="btn-sm" onclick="changeCount(1)" style="width:44px;font-size:20px;padding:6px">＋</button>
      <button class="btn-sm" onclick="initBuildings()" style="margin-left:8px;">重新排列</button>
    </div>
  </div>

  <div class="container wide">
    <h2>② 平面排列（俯視）</h2>

    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px;">
      <span style="color:#555;font-size:13px;">點擊＝轉向　拖曳＝移位　右鍵＝刪除　滾輪＝縮放</span>
      <span style="margin-left:auto;display:flex;gap:6px;">
        <button class="btn-sm" onclick="adjZoom(1.3)">＋</button>
        <button class="btn-sm" onclick="adjZoom(0.77)">－</button>
        <button class="btn-sm" onclick="adjZoom(0)" style="font-size:11px">⊙</button>
      </span>
    </div>

    <div id="canvasWrap"><canvas id="cv"></canvas></div>

    <div style="display:flex;gap:16px;margin-top:8px;font-size:13px;color:#666;flex-wrap:wrap;">
      <span>🔵 正向</span><span style="color:#c07020">🟠 轉向90°</span>
    </div>

    <div class="result-box" id="layoutInfo" style="text-align:center;margin-top:8px;">
      點格子設定排列
    </div>
  </div>

  <div class="container">
    <h2>③ 屋頂設定</h2>
    <div class="row">
      <label>排水方向</label>
      <select id="roofDir" onchange="draw()">
        <option value="col">沿寬排水（前後流）</option>
        <option value="row">沿深排水（左右流）</option>
      </select>
    </div>
    <div class="row">
      <label>斜面</label>
      <select id="roofType">
        <option value="1">單斜</option>
        <option value="2">雙斜</option>
      </select>
    </div>
    <div class="row">
      <label>浪板類型</label>
      <select id="panelType">
        <option value="清版">清版</option>
        <option value="三合一">三合一</option>
        <option value="琉璃瓦">琉璃瓦</option>
      </select>
    </div>
    <div class="row">
      <label>顏色</label>
      <select id="panelColor">
        <option value="白色">白色</option>
        <option value="蘋果綠">蘋果綠</option>
        <option value="鐵灰">鐵灰</option>
        <option value="紅色">紅色</option>
        <option value="黑色">黑色</option>
      </select>
    </div>
    <div class="row">
      <label>浪板寬</label>
      <select id="waveW">
        <option value="75">75 cm（標準）</option>
        <option value="90">90 cm</option>
      </select>
    </div>
    <div class="row">
      <label>分水比</label>
      <input type="number" id="slopeR" value="1" min="0.5" step="0.5" inputmode="decimal">
    </div>
    <p style="color:#555;font-size:12px;margin:4px 0 0 90px;">分水:10＝坡度比（例：1:10）</p>
    <button onclick="calcMats()">計算材料清單</button>
  </div>

  <div class="container">
    <h2>④ 材料清單</h2>
    <div class="result-box" id="matResult">請先完成 ①②③ 再按計算</div>
  </div>

</div>

<script>
// buildings: [{x,y,state}] x,y單位cm，state:1=正向(W×D) 2=轉向(D×W)
let unitW=301, unitD=596;
let bldCount=4;
let buildings=[];
let _zoom=1;

function bDims(b){ return b.state===2?{bw:unitD,bd:unitW}:{bw:unitW,bd:unitD}; }

function pickW(v,el){
  document.querySelectorAll('#wBtns .sz').forEach(b=>b.classList.remove('on'));
  el.classList.add('on'); unitW=v; updSizeInfo(); draw();
}
function pickD(v,el){
  document.querySelectorAll('#dBtns .sz').forEach(b=>b.classList.remove('on'));
  el.classList.add('on'); unitD=v; updSizeInfo(); draw();
}
function updSizeInfo(){
  let ping=(unitW*unitD/33057.85).toFixed(2);
  document.getElementById('sizeInfo').innerHTML=
    `正向：${unitW}×${unitD} cm｜轉向：${unitD}×${unitW} cm｜<b>${ping} 坪/間</b>`;
}

function changeCount(d){
  bldCount=Math.max(1,Math.min(20,bldCount+d));
  document.getElementById('bldCountVal').textContent=bldCount;
}
function initBuildings(){
  buildings=[];
  let cols=Math.min(bldCount,5);
  for(let i=0;i<bldCount;i++)
    buildings.push({x:(i%cols)*unitW, y:Math.floor(i/cols)*unitD, state:1});
  draw(); updLayout();
}

const PAD=40;
let _sc=1, _ox=0, _oy=0;

function draw(){
  const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
  if(!buildings.length){
    cv.width=320; cv.height=160;
    ctx.fillStyle='#111'; ctx.fillRect(0,0,cv.width,cv.height);
    ctx.fillStyle='#555'; ctx.font='14px Arial'; ctx.textAlign='center';
    ctx.fillText('點「全選」初始排列',cv.width/2,cv.height/2); return;
  }
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  buildings.forEach(b=>{ let{bw,bd}=bDims(b);
    minX=Math.min(minX,b.x); minY=Math.min(minY,b.y);
    maxX=Math.max(maxX,b.x+bw); maxY=Math.max(maxY,b.y+bd); });
  const vw=Math.min(window.innerWidth-60,760);
  let sc=Math.min((vw-PAD*2)/(maxX-minX),(520-PAD*2)/(maxY-minY))*_zoom;
  _sc=sc; _ox=minX; _oy=minY;
  cv.width=Math.ceil((maxX-minX)*sc)+PAD*2;
  cv.height=Math.ceil((maxY-minY)*sc)+PAD*2;
  ctx.fillStyle='#0e0e0e'; ctx.fillRect(0,0,cv.width,cv.height);

  // 淡網格（10cm對齊參考）
  let gridCm=Math.max(unitW,unitD); // 以最大邊為格
  ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=0.5;
  for(let x=0;x<(maxX-minX);x+=gridCm){
    let px=PAD+x*sc; ctx.beginPath(); ctx.moveTo(px,PAD); ctx.lineTo(px,cv.height-PAD); ctx.stroke();
  }
  for(let y=0;y<(maxY-minY);y+=gridCm){
    let py=PAD+y*sc; ctx.beginPath(); ctx.moveTo(PAD,py); ctx.lineTo(cv.width-PAD,py); ctx.stroke();
  }

  // 排水箭頭
  let dir=document.getElementById('roofDir').value;
  ctx.save(); ctx.strokeStyle='#ff9500'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
  if(dir==='col'){
    let y=cv.height/2;
    ctx.beginPath(); ctx.moveTo(PAD,y); ctx.lineTo(cv.width-PAD,y); ctx.stroke();
    ctx.setLineDash([]); ctx.fillStyle='#ff9500'; ctx.font='11px Arial'; ctx.textAlign='center';
    ctx.fillText('↓ 排水',cv.width/2,y-5);
  } else {
    let x=cv.width/2;
    ctx.beginPath(); ctx.moveTo(x,PAD); ctx.lineTo(x,cv.height-PAD); ctx.stroke();
    ctx.setLineDash([]); ctx.fillStyle='#ff9500'; ctx.font='11px Arial'; ctx.textAlign='left';
    ctx.fillText('→排水',x+4,cv.height/2);
  }
  ctx.restore();

  buildings.forEach((b,i)=>{
    let{bw,bd}=bDims(b);
    let px=PAD+Math.floor((b.x-minX)*sc);
    let py=PAD+Math.floor((b.y-minY)*sc);
    let pw=Math.max(20,Math.floor(bw*sc)), ph=Math.max(16,Math.floor(bd*sc));
    ctx.fillStyle=b.state===2?'#5c3300':'#1a3d6e';
    ctx.fillRect(px+1,py+1,pw-2,ph-2);
    ctx.strokeStyle=i===_di?'#fff':(b.state===2?'#e07800':'#4d8edb');
    ctx.lineWidth=i===_di?2.5:1.5;
    ctx.strokeRect(px+1,py+1,pw-2,ph-2);
    let fs=Math.min(12,Math.min(pw,ph)/5);
    if(fs>=7){
      ctx.fillStyle=b.state===2?'#f0a040':'#7ab3e8';
      ctx.font=`${fs}px Arial`; ctx.textAlign='center';
      ctx.fillText(b.state===2?`↻${bw}×${bd}`:`${bw}×${bd}`,px+pw/2,py+ph/2+fs/3);
    }
  });
}

function hitTest(ex,ey){
  const cv=document.getElementById('cv'), rect=cv.getBoundingClientRect();
  let px=(ex-rect.left)*(cv.width/rect.width)-PAD;
  let py=(ey-rect.top)*(cv.height/rect.height)-PAD;
  let cx=px/_sc+_ox, cy=py/_sc+_oy;
  for(let i=buildings.length-1;i>=0;i--){
    let b=buildings[i],{bw,bd}=bDims(b);
    if(cx>=b.x&&cx<=b.x+bw&&cy>=b.y&&cy<=b.y+bd) return i;
  }
  return -1;
}

// 端點吸附：找最近一對邊，在閾值內就對齊
function snapEdges(idx){
  let b=buildings[idx], {bw,bd}=bDims(b);
  const T=Math.max(20,50/_sc); // ~50px 換算成 cm 閾值
  let bestDx=T+1, bestDy=T+1, snapX=null, snapY=null;
  buildings.forEach((o,i)=>{
    if(i===idx) return;
    let{bw:ow,bd:od}=bDims(o);
    [[b.x,o.x],[b.x,o.x+ow],[b.x+bw,o.x],[b.x+bw,o.x+ow]].forEach(([be,oe])=>{
      let d=Math.abs(be-oe); if(d<bestDx){bestDx=d;snapX=oe-(be-b.x);}
    });
    [[b.y,o.y],[b.y,o.y+od],[b.y+bd,o.y],[b.y+bd,o.y+od]].forEach(([be,oe])=>{
      let d=Math.abs(be-oe); if(d<bestDy){bestDy=d;snapY=oe-(be-b.y);}
    });
  });
  if(snapX!==null) b.x=snapX;
  if(snapY!==null) b.y=snapY;
}

function adjZoom(f){ _zoom=f?Math.min(4,Math.max(0.2,_zoom*f)):1; draw(); }

let _di=-1, _ds=null, _do=null, _drag=false;
const THRESH=6;
function evXY(e){ return e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY}; }
function evEndXY(e){ return e.changedTouches?{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY}:{x:e.clientX,y:e.clientY}; }

function onDown(e){
  e.preventDefault();
  let{x,y}=evXY(e), idx=hitTest(x,y);
  if(idx===-1) return;
  _di=idx; _ds={x,y}; _do={x:buildings[idx].x,y:buildings[idx].y}; _drag=false;
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onUp);
}
function onMove(e){
  if(_di===-1) return; e.preventDefault();
  let{x,y}=evXY(e), dx=x-_ds.x, dy=y-_ds.y;
  if(!_drag&&Math.hypot(dx,dy)<THRESH) return;
  _drag=true;
  const cv=document.getElementById('cv'), r=cv.getBoundingClientRect();
  let sx=cv.width/r.width, sy=cv.height/r.height;
  buildings[_di].x=Math.round((_do.x+dx*sx/_sc)/10)*10;
  buildings[_di].y=Math.round((_do.y+dy*sy/_sc)/10)*10;
  snapEdges(_di);
  draw();
}
function onUp(e){
  document.removeEventListener('mousemove',onMove);
  document.removeEventListener('mouseup',onUp);
  document.removeEventListener('touchmove',onMove);
  document.removeEventListener('touchend',onUp);
  if(_di===-1) return;
  if(!_drag){ buildings[_di].state=buildings[_di].state===1?2:1; }
  _di=-1; _drag=false; draw(); updLayout();
}

const cv=document.getElementById('cv');
cv.addEventListener('mousedown',onDown);
cv.addEventListener('touchstart',onDown,{passive:false});
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  adjZoom(e.deltaY<0?1.15:0.87);
},{passive:false});
cv.addEventListener('contextmenu',e=>{
  e.preventDefault();
  let idx=hitTest(e.clientX,e.clientY);
  if(idx!==-1){ buildings.splice(idx,1); draw(); updLayout(); }
});
window.addEventListener('resize',draw);

function updLayout(){
  let m2=buildings.reduce((s,b)=>{ let{bw,bd}=bDims(b); return s+bw*bd/10000; },0);
  let ping=(m2*10000/33057.85).toFixed(2);
  document.getElementById('layoutInfo').innerHTML=
    `共 <b>${buildings.length}</b> 間｜覆蓋面積：<b>${m2.toFixed(1)} m²</b>（${ping} 坪）`;
}

function calcMats(){
  if(!buildings.length){ document.getElementById('matResult').innerHTML='⚠️ 請先排列組合屋'; return; }
  let rType=parseInt(document.getElementById('roofType').value);
  let wW=parseInt(document.getElementById('waveW').value);
  let sr=parseFloat(document.getElementById('slopeR').value)||1;
  let dir=document.getElementById('roofDir').value;
  let panelType=document.getElementById('panelType').value;
  let panelColor=document.getElementById('panelColor').value;
  let rad=Math.atan(sr/10), sFac=1/Math.cos(rad);
  let ts=0,tr=0,tp=0,fm=0,rm=0;
  buildings.forEach(b=>{
    let{bw,bd}=bDims(b);
    let sp=dir==='col'?bd:bw, pp=dir==='col'?bw:bd;
    let sl=(rType===2?sp/2:sp)*sFac;
    let pc=Math.floor(sl/60)+2;
    fm+=bw*bd/10000; rm+=(bw*bd/10000)*sFac*rType;
    ts+=Math.ceil(pp/wW)*rType;
    if(rType===2) tr+=pp/100;
    tp+=(pp/100)*pc*rType;
  });
  let sRef=dir==='col'?unitD:unitW, slRef=((rType===2?sRef/2:sRef)*sFac/100).toFixed(2);
  let h=`
    <div class="mat-row"><span class="mat-lbl">組合屋數量</span><span class="mat-val">${buildings.length} 間</span></div>
    <div class="mat-row"><span class="mat-lbl">覆蓋面積（水平）</span><span class="mat-val">${fm.toFixed(1)} m²</span></div>
    <div class="mat-row"><span class="mat-lbl">屋面實際面積</span><span class="mat-val">${rm.toFixed(1)} m²</span></div>
    <div class="mat-row"><span class="mat-lbl">坡度</span><span class="mat-val">1:${sr}（${(rad*180/Math.PI).toFixed(1)}°）</span></div>
    <div class="mat-row"><span class="mat-lbl">斜長參考（正向）</span><span class="mat-val">${slRef} 米</span></div>
    <hr style="border-color:#222;margin:6px 0;">
    <div class="mat-row"><span class="mat-lbl">浪板類型</span><span class="mat-val">${panelType}／${panelColor}</span></div>
    <div class="mat-row"><span class="mat-lbl">🌊 浪板數量（${wW}cm寬）</span><span class="mat-val">${ts} 片</span></div>`;
  if(rType===2) h+=`<div class="mat-row"><span class="mat-lbl">🔺 中脊收邊長度</span><span class="mat-val">${tr.toFixed(2)} 米</span></div>`;
  h+=`<div class="mat-row"><span class="mat-lbl">📏 C型鋼桁條（參考）</span><span class="mat-val">${tp.toFixed(1)} 米</span></div>
    <hr style="border-color:#222;margin:6px 0;">
    <div style="color:#555;font-size:12px;">⚠️ 以上為估算；實際施工請現場核對<br>浪板每片需長：<b>${slRef}m</b>，採購時加計搭接（+5~10cm）</div>`;
  document.getElementById('matResult').innerHTML=h;
}

updSizeInfo(); initBuildings();
</script>
</body>
</html>
